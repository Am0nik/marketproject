<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продукт</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
    body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
    }

    main{
        margin: 0;
        padding-bottom: 20px;
    }
</style>
<body>
    <div style="flex-grow: 1;">
        <main>
            <div class="header">
                <a href="index.html"><img src="img/back.png" width="40" alt="назад"></a>
                <div style="gap: 40px;display: flex;">
                    <a href="backet.html"><img src="img/shopping-cart.png" width="40" alt="корзина"></a>
                    <a href="profile.html" id="profileLink">
                        <img src="img/profile.png" width="40" alt="профиль">
                    </a>
                </div>
            </div>
            <div class="container my-5">
                <div class="card shadow-sm">
                    <div class="row g-0">
                        <div class="col-md-6" style="display: flex;width: 100% !important;">
                            <img src="https://placeholder.com" class="img-fluid product-img w-100" id='img-p' alt="Товар">
                        </div>

                        <div class="col-md-6 p-4 d-flex flex-column justify-content-center" style="width: 100%;">
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb mb-2">
                                    <li class="breadcrumb-item"><a href="index.html">Главная</a></li>
                                    <li class="breadcrumb-item active">Категория</li>
                                </ol>
                            </nav>

                            <h1 class="display-6 fw-bold" id="title"></h1>
                            <p class="text-muted small" id="article">Артикул: 123456</p>

                            <div class="price mb-3" id="price">24 990 ₽</div>

                            <p class="mb-4" id="desc">
                                Это краткое описание вашего замечательного товара.
                            </p>

                            <div class="d-grid gap-2">
                                <button class="btn btn-primary btn-lg" type="button" id="toCard">В корзину</button>
                            </div>
                        </div>
                    </div>
                </div>
            <!--harak-->
            <div class="mt-5">
                <h3>Характеристики</h3>
                <table class="table table-striped mt-3">
                    <tr>
                        <td>Габариты</td>
                        <td id="gab"></td>
                    </tr>
                    <tr>
                        <td>Материал</td>
                        <td id="material"></td>
                    </tr>
                    <tr>
                        <td>Гарантия</td>
                        <td id="gar"></td>
                    </tr>
                </table>
            </div>
            <br><br><br>
            <div class="container">
                <h2>Отзывы</h2>
                <ul class="list-group list-group-flush" id="review">

                </ul>
            </div>
        </main>
    </div>
    <footer>
        <p>© 2026 Amonik. Все права защищены</p>
    </footer>
</body>
<script src="js/product.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
